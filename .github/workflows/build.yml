name: Build MeTube APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lay ma nguon
        uses: actions/checkout@v3

      - name: 2. Cai dat Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Cap quyen thuc thi Gradle
        run: chmod +x ./gradlew

      - name: 4. Bat dau dong goi APK
        run: ./gradlew assembleDebug

      - name: 5. Luu file thanh pham
        uses: actions/upload-artifact@v3
        with:
          name: MeTube-Install-File
          path: app/build/outputs/apk/debug/app-debug.apk
